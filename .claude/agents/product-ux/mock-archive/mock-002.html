<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mock-002 — モバイル詳細シート：日付UI据え置き＋24h気温グラフ</title>
  <!--
    【課題】選択した日の気温推移を、降雪バーと並べて把握したい（本番データは改変しない・表示のみ）。

    【設計方針】
    - 日付ブロックは本番 ski-powder-hunter.html と同型のまま：
      sheet-main-tabs（今日 / 明日 / 5日間）＋ 5日間選択時のみ sheet-sub-days（明後日〜+6日）。
    - その下は本番どおり popup-day-summary → popup-hourly-strip（降雪・時間帯はダミー）。
    - 追加は降雪ストリップの直後：24時間気温の折れ線（SVG）。数値はモック用ダミーのみ。
    - 実装時は Open-Meteo 由来の hourly_temp_2m をスライスして描画する想定（データ捏造なし）。

    【受け入れ条件（モック）】
    - ブラウザで開き、日付チップの見た目が本番のタブ＋サブ行に近いこと。
    - 気温グラフが読み取れること（軸ラベル・最低/最高の併記）。
  -->
  <style>
    :root {
      --card-bg: #132a45;
      --border: rgba(125, 170, 210, 0.25);
      --text: #e8f1ff;
      --text-dim: #8aa4c0;
      --accent: #4dd9c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: "Noto Sans JP", system-ui, sans-serif;
      background: #050a12;
      color: var(--text);
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--text-dim);
    }
    .mock-banner {
      max-width: 420px;
      margin: 0 auto 16px;
      font-size: 10px;
      color: var(--accent);
      padding: 8px 10px;
      border: 1px solid rgba(77, 217, 196, 0.35);
      border-radius: 8px;
      background: rgba(77, 217, 196, 0.06);
    }
    .sheet {
      max-width: 420px;
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      padding: 10px 10px 20px;
    }
    .sheet__grab {
      height: 4px;
      width: 36px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      margin: 0 auto 10px;
    }

    /* ── 本番相当：sheet-main-tabs / popup-day-strip ── */
    .sheet-main-tabs {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin: 0 0 8px;
      padding: 0;
      border-bottom: 1px solid var(--border);
    }
    .sheet-main-tab {
      flex: 1;
      min-width: 0;
      padding: 10px 6px;
      margin: 0;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: default;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .sheet-main-tab.is-active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .popup-day-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }
    .sheet-sub-days .popup-day-tab { flex: 1; min-width: 0; width: 100%; }
    .popup-day-tab {
      flex: 1;
      min-width: 0;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      font-size: 10px;
      font-family: inherit;
      cursor: default;
    }
    .popup-day-tab .popup-day-label { font-size: 9px; margin-bottom: 2px; }
    .popup-day-tab .popup-day-snow {
      font-size: 11px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-day-tab.is-active {
      border-color: var(--accent);
      background: rgba(77, 217, 196, 0.18);
      color: #fff;
    }

    .popup-day-summary {
      margin: 4px 0 6px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .popup-day-summary-row { margin-bottom: 2px; }
    .popup-day-summary-row strong { color: var(--text); }
    .snow-depth-source { opacity: 0.85; font-size: 9px; }

    .popup-hourly-strip {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
      overflow-x: hidden;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }
    .popup-hourly-bar { min-width: 0; text-align: center; }
    .popup-hourly-bar-bg {
      position: relative;
      width: 100%;
      height: 18px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    .popup-hourly-fill {
      width: 100%;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(to top, #5ab0ff, #7ec8ff);
    }
    .popup-hourly-icon {
      position: absolute;
      top: 1px;
      font-size: 9px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    .popup-hourly-label {
      margin-top: 2px;
      font-size: 8px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 追加：気温チャート（本番への差分イメージ） ── */
    .popup-temp-chart {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .popup-temp-chart__caption {
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-temp-chart__svg-wrap {
      width: 100%;
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
      padding: 6px 4px 2px;
    }
    .popup-temp-chart svg {
      display: block;
      width: 100%;
      height: auto;
      max-height: 100px;
    }
    .popup-temp-chart__line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .popup-temp-chart__fill {
      fill: url(#tempGrad);
      opacity: 0.25;
    }
    .popup-temp-chart__axis {
      fill: var(--text-dim);
      font-size: 8px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-temp-chart__minmax {
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .popup-temp-chart__minmax strong { color: var(--text); }
  </style>
</head>
<body>
  <p class="mock-banner">MOCK <code>mock-002.html</code> · 本番 HTML は変更していません（閲覧のみ参照）</p>
  <h1>モバイル詳細シート：日付UI据え置き ＋ 24h 気温（ダミー曲線）</h1>

  <div class="sheet">
    <div class="sheet__grab" aria-hidden="true"></div>

    <!-- 本番と同型：今日 / 明日 / 5日間 -->
    <div class="sheet-main-tabs" role="tablist">
      <button type="button" class="sheet-main-tab" role="tab" aria-selected="false">今日</button>
      <button type="button" class="sheet-main-tab" role="tab" aria-selected="false">明日</button>
      <button type="button" class="sheet-main-tab is-active" role="tab" aria-selected="true">5日間</button>
    </div>

    <!-- 5日間選択時のサブ行（明後日〜+6） -->
    <div class="popup-day-strip sheet-sub-days" role="group" aria-label="5日間の日付">
      <button type="button" class="popup-day-tab"><div class="popup-day-label">明後日</div><div class="popup-day-snow">❄ 8cm</div></button>
      <button type="button" class="popup-day-tab is-active"><div class="popup-day-label">+3日</div><div class="popup-day-snow">❄ 14cm</div></button>
      <button type="button" class="popup-day-tab"><div class="popup-day-label">+4日</div><div class="popup-day-snow">—</div></button>
      <button type="button" class="popup-day-tab"><div class="popup-day-label">+5日</div><div class="popup-day-snow">❄ 3cm</div></button>
      <button type="button" class="popup-day-tab"><div class="popup-day-label">+6日</div><div class="popup-day-snow">—</div></button>
    </div>

    <div class="popup-day-summary">
      <div class="popup-day-summary-row">前日合計（D-1予測） <strong>2.4cm</strong> / 当日合計 <strong>14.0cm</strong></div>
      <div class="popup-day-summary-row">雨リスク: <strong>雪主体</strong></div>
      <div class="popup-day-summary-row">山頂風: <strong>28km/h ↗</strong>（やや北寄り）</div>
    </div>

    <!-- 時間帯降雪バー（ダミー・本番 popup-hourly-strip に相当） -->
    <div class="popup-hourly-strip">
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:6px"></div></div><div class="popup-hourly-label">前12–18</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:8px"></div></div><div class="popup-hourly-label">前18–24</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:14px"></div></div><div class="popup-hourly-label">0-5</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:10px"></div></div><div class="popup-hourly-label">6-10</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:16px"></div></div><div class="popup-hourly-label">11-15</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:9px"></div></div><div class="popup-hourly-label">16-20</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:12px"></div></div><div class="popup-hourly-label">21-24</div></div>
      <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:5px"></div></div><div class="popup-hourly-label">翌0-5</div></div>
    </div>

    <!-- 追加ブロック：24h 気温（ダミー SVG。実装時は hourly の実測配列から生成） -->
    <div class="popup-temp-chart">
      <div class="popup-temp-chart__caption">24h 気温（選択日・1時間ごと・モック値）</div>
      <div class="popup-temp-chart__svg-wrap">
        <svg viewBox="0 0 320 88" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="tempGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#4dd9c4" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#4dd9c4" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- ダミー: 0–23時の気温っぽい曲線（-9°C 〜 -3°C） -->
          <path class="popup-temp-chart__fill" d="M 8 52 L 22 48 L 36 44 L 50 40 L 64 38 L 78 36 L 92 34 L 106 33 L 120 32 L 134 34 L 148 38 L 162 42 L 176 46 L 190 50 L 204 54 L 218 56 L 232 58 L 246 58 L 260 56 L 274 52 L 288 48 L 302 46 L 312 48 L 312 80 L 8 80 Z"/>
          <path class="popup-temp-chart__line" d="M 8 52 L 22 48 L 36 44 L 50 40 L 64 38 L 78 36 L 92 34 L 106 33 L 120 32 L 134 34 L 148 38 L 162 42 L 176 46 L 190 50 L 204 54 L 218 56 L 232 58 L 246 58 L 260 56 L 274 52 L 288 48 L 302 46"/>
          <text class="popup-temp-chart__axis" x="8" y="14">0h</text>
          <text class="popup-temp-chart__axis" x="148" y="14">12h</text>
          <text class="popup-temp-chart__axis" x="286" y="14">23h</text>
          <text class="popup-temp-chart__axis" x="8" y="30">-3°</text>
          <text class="popup-temp-chart__axis" x="8" y="62">-9°</text>
        </svg>
      </div>
      <div class="popup-temp-chart__minmax">🌡️ 最低/最高（当日） <strong>-9°C / -3°C</strong>（ダミー）</div>
    </div>
  </div>
</body>
</html>
