<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>mock-005 — 全画面：メイン日付タブ廃止＋地図＋トップ＋0°C線</title>
  <!--
    【変更（mock-004 から）】
    - 本番にあった「今日 / 明日 / 5日間」の**メインタブ行（sheet-main-tabs）は不要**のためモックから削除。
    - 日付の切り替えは**1段の横スクロールチップ**（今日〜+6）に集約（本番実装案のUI用）。
    - 維持: 地図ペイン常時表示・全画面レイアウト・24h気温＋**0°C 破線**・**トップ**リンク（本番 #link-to-top 相当）。

    【受け入れ】スクリーンショットの3タブ帯が存在しないこと。地図が消えないこと。
  -->
  <style>
    :root {
      --map-bg: #0d1f36;
      --card-bg: #132a45;
      --border: rgba(125, 170, 210, 0.25);
      --text: #e8f1ff;
      --text-dim: #8aa4c0;
      --accent: #4dd9c4;
      --zero-line: rgba(255, 200, 120, 0.85);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      margin: 0;
    }
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      font-family: "Noto Sans JP", system-ui, sans-serif;
      color: var(--text);
      background: #030810;
    }

    .mock-viewport {
      width: 100%;
      min-height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }

    .mock-map-pane {
      flex: 1 1 42%;
      min-height: 38vh;
      width: 100%;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 120% 80% at 30% 40%, rgba(60, 100, 140, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse 90% 70% at 70% 60%, rgba(40, 80, 60, 0.25) 0%, transparent 50%),
        linear-gradient(165deg, #152a48 0%, #0a1628 45%, #0d2038 100%);
    }
    .mock-map-pane::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          -12deg,
          transparent,
          transparent 18px,
          rgba(255, 255, 255, 0.03) 18px,
          rgba(255, 255, 255, 0.03) 19px
        );
      pointer-events: none;
    }
    .mock-map-roads {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
    }
    .mock-map-marker {
      position: absolute;
      left: 52%;
      top: 46%;
      width: 22px;
      height: 22px;
      margin: -11px 0 0 -11px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: linear-gradient(135deg, var(--accent), #2a9d86);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.9);
    }
    .mock-map-marker::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      margin: -3px 0 0 -3px;
      border-radius: 50%;
      background: #fff;
      transform: rotate(45deg);
    }
    /* 本番 #link-to-top 相当（地図表示中にヘッダーへ出る「トップ」） */
    .mock-link-to-top {
      position: absolute;
      right: max(10px, env(safe-area-inset-right));
      top: 10px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      border-radius: 8px;
      background: rgba(3, 8, 16, 0.78);
      border: 1px solid rgba(77, 217, 196, 0.4);
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
    }
    .mock-link-to-top:active {
      opacity: 0.88;
    }
    .mock-map-badge {
      position: absolute;
      left: max(10px, env(safe-area-inset-left));
      top: 10px;
      max-width: min(52%, calc(100% - 120px));
      font-size: 10px;
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(3, 8, 16, 0.72);
      border: 1px solid rgba(77, 217, 196, 0.35);
      backdrop-filter: blur(6px);
      line-height: 1.35;
    }
    .mock-map-badge code { font-size: 9px; }
    .mock-map-caption {
      position: absolute;
      right: max(10px, env(safe-area-inset-right));
      bottom: 10px;
      font-size: 9px;
      color: rgba(200, 220, 240, 0.5);
      text-align: right;
      max-width: 55%;
      line-height: 1.4;
    }

    .mock-sheet-outer {
      flex: 0 1 auto;
      width: 100%;
      max-height: min(58vh, calc(100dvh - 28vh));
      min-height: 220px;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet {
      flex: 1;
      width: 100%;
      max-width: none;
      margin: 0;
      background: var(--card-bg);
      border: solid var(--border);
      border-width: 1px 0 0 0;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -12px 48px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .sheet__grab {
      flex-shrink: 0;
      height: 4px;
      width: 36px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      margin: 10px auto 6px;
    }
    .sheet-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 12px 24px;
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
    }

    /* メイン3タブ（今日/明日/5日間）は廃止 — スタイルも定義しない */

    /* 1段スクロールの日付チップ（今日〜+6） */
    .popup-day-strip--scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin: 0 0 10px;
      padding: 2px 2px 6px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .popup-day-strip--scroll::-webkit-scrollbar {
      display: none;
    }
    .popup-day-strip--scroll .popup-day-tab {
      flex: 0 0 auto;
      min-width: 56px;
      padding: 7px 8px;
    }
    .popup-day-tab {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-dim);
      font-size: 10px;
      font-family: inherit;
      cursor: default;
      text-align: center;
    }
    .popup-day-tab .popup-day-label {
      font-size: 9px;
      margin-bottom: 2px;
    }
    .popup-day-tab .popup-day-snow {
      font-size: 11px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-day-tab.is-active {
      border-color: rgba(245, 180, 90, 0.85);
      box-shadow: 0 0 0 1px rgba(245, 180, 90, 0.35);
      background: rgba(77, 217, 196, 0.12);
      color: #fff;
    }

    .popup-day-summary {
      margin: 4px 0 6px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .popup-day-summary-row {
      margin-bottom: 2px;
    }
    .popup-day-summary-row strong {
      color: var(--text);
    }

    .popup-hourly-strip {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
      width: 100%;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }
    .popup-hourly-bar {
      min-width: 0;
      text-align: center;
    }
    .popup-hourly-bar-bg {
      position: relative;
      width: 100%;
      height: 18px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }
    .popup-hourly-fill {
      width: 100%;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(to top, #5ab0ff, #7ec8ff);
    }
    .popup-hourly-icon {
      position: absolute;
      top: 1px;
      font-size: 9px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }
    .popup-hourly-label {
      margin-top: 2px;
      font-size: 8px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .popup-temp-chart {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      width: 100%;
    }
    .popup-temp-chart__caption {
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-temp-chart__svg-wrap {
      width: 100%;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      padding: 8px 4px 4px;
    }
    .popup-temp-chart svg {
      display: block;
      width: 100%;
      height: auto;
      min-height: 120px;
    }
    .popup-temp-chart__line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .popup-temp-chart__fill {
      fill: url(#tempGrad005);
      opacity: 0.22;
    }
    .popup-temp-chart__axis {
      fill: var(--text-dim);
      font-size: 9px;
      font-family: "Space Mono", ui-monospace, monospace;
    }
    .popup-temp-chart__zero-line {
      stroke: var(--zero-line);
      stroke-width: 1.25;
      stroke-dasharray: 5 4;
      opacity: 0.95;
    }
    .popup-temp-chart__zero-label {
      fill: var(--zero-line);
      font-size: 9px;
      font-family: "Space Mono", ui-monospace, monospace;
      font-weight: 700;
    }
    .popup-temp-chart__minmax {
      margin-top: 8px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .popup-temp-chart__minmax strong {
      color: var(--text);
    }

    .mock-filler-below {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed rgba(125, 170, 210, 0.2);
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="mock-viewport">
    <div class="mock-map-pane" role="img" aria-label="地図モック（全幅・画面上部〜中部）">
      <svg class="mock-map-roads" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <path d="M -20 180 Q 80 200 160 140 T 320 100 T 420 60" fill="none" stroke="rgba(200,210,230,0.2)" stroke-width="6" stroke-linecap="round"/>
        <path d="M 40 280 Q 120 200 200 220 T 380 180" fill="none" stroke="rgba(180,195,220,0.12)" stroke-width="4" stroke-linecap="round"/>
        <path d="M 200 -10 Q 220 100 180 200 T 160 310" fill="none" stroke="rgba(160,180,210,0.1)" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="mock-map-marker" aria-hidden="true"></div>
      <a href="#" class="mock-link-to-top" title="本番では showTopView() でトップ画面へ">トップ</a>
      <div class="mock-map-badge">
        MOCK <code>mock-005.html</code><br />
        メイン日付3タブ削除・日付は下段スクロールのみ
      </div>
      <div class="mock-map-caption">地図エリアは常時表示。トップ＝本番ヘッダーリンク相当。</div>
    </div>

    <div class="mock-sheet-outer">
      <div class="sheet" role="document">
        <div class="sheet__grab" aria-hidden="true"></div>
        <div class="sheet-scroll">
          <!-- 「今日 / 明日 / 5日間」行は置かない -->
          <div class="popup-day-strip--scroll" role="tablist" aria-label="日付（1段・横スクロール）">
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">今日</div><div class="popup-day-snow">❄ 4cm</div></button>
            <button type="button" class="popup-day-tab is-active" role="tab" aria-selected="true"><div class="popup-day-label">明日</div><div class="popup-day-snow">❄ 11cm</div></button>
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">明後日</div><div class="popup-day-snow">❄ 8cm</div></button>
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">+3日</div><div class="popup-day-snow">❄ 14cm</div></button>
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">+4日</div><div class="popup-day-snow">—</div></button>
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">+5日</div><div class="popup-day-snow">❄ 3cm</div></button>
            <button type="button" class="popup-day-tab" role="tab"><div class="popup-day-label">+6日</div><div class="popup-day-snow">—</div></button>
          </div>

          <div class="popup-day-summary">
            <div class="popup-day-summary-row">前日合計（D-1予測） <strong>2.4cm</strong> / 当日合計 <strong>14.0cm</strong></div>
            <div class="popup-day-summary-row">雨リスク: <strong>雪主体</strong></div>
            <div class="popup-day-summary-row">山頂風: <strong>28km/h ↗</strong></div>
          </div>

          <div class="popup-hourly-strip">
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:6px"></div></div><div class="popup-hourly-label">前12–18</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:8px"></div></div><div class="popup-hourly-label">前18–24</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:14px"></div></div><div class="popup-hourly-label">0-5</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:10px"></div></div><div class="popup-hourly-label">6-10</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:16px"></div></div><div class="popup-hourly-label">11-15</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:9px"></div></div><div class="popup-hourly-label">16-20</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:12px"></div></div><div class="popup-hourly-label">21-24</div></div>
            <div class="popup-hourly-bar"><div class="popup-hourly-bar-bg"><span class="popup-hourly-icon">❄</span><div class="popup-hourly-fill" style="height:5px"></div></div><div class="popup-hourly-label">翌0-5</div></div>
          </div>

          <div class="popup-temp-chart">
            <div class="popup-temp-chart__caption">24h 気温（モック）・0°C 基準線あり</div>
            <div class="popup-temp-chart__svg-wrap">
              <svg viewBox="0 0 320 118" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="24時間気温グラフ">
                <defs>
                  <linearGradient id="tempGrad005" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4dd9c4" stop-opacity="0.45"/>
                    <stop offset="100%" stop-color="#4dd9c4" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <text class="popup-temp-chart__axis" x="36" y="16">0h</text>
                <text class="popup-temp-chart__axis" x="156" y="16" text-anchor="middle">12h</text>
                <text class="popup-temp-chart__axis" x="300" y="16" text-anchor="end">23h</text>
                <text class="popup-temp-chart__axis" x="4" y="32">+4°</text>
                <text class="popup-temp-chart__axis" x="4" y="50">0°</text>
                <text class="popup-temp-chart__axis" x="4" y="98">-10°</text>
                <line class="popup-temp-chart__zero-line" x1="36" y1="47.43" x2="300" y2="47.43"/>
                <text class="popup-temp-chart__zero-label" x="304" y="50">0°C</text>
                <path class="popup-temp-chart__fill" d="M 36 82 L 48 86 L 60 90 L 72 92 L 84 93 L 96 92 L 108 88 L 120 82 L 132 72 L 144 60 L 156 50 L 168 44 L 180 40 L 192 38 L 204 40 L 216 46 L 228 52 L 240 58 L 252 64 L 264 70 L 276 74 L 288 78 L 300 80 L 300 104 L 36 104 Z"/>
                <path class="popup-temp-chart__line" d="M 36 82 L 48 86 L 60 90 L 72 92 L 84 93 L 96 92 L 108 88 L 120 82 L 132 72 L 144 60 L 156 50 L 168 44 L 180 40 L 192 38 L 204 40 L 216 46 L 228 52 L 240 58 L 252 64 L 264 70 L 276 74 L 288 78 L 300 80"/>
              </svg>
            </div>
            <div class="popup-temp-chart__minmax">🌡️ 最低/最高（ダミー） <strong>-10°C / +2°C</strong></div>
          </div>

          <div class="mock-filler-below">
            メインの「今日｜明日｜5日間」タブ行は削除済み。日付は上記1段スクロールのみ。地図は上ペイン固定。
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
