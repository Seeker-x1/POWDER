<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>mock-008 — 非タッチ帯＋全ゲレンデ表示＋小型ターゲット日</title>
  <!--
    【追記・制約】
    - 端末上部にスピーカー等があり**片側（本モックでは左）に非タッチ・誤タップ回避ゾーン**がある前提。
    - そのため**画面上部の帯**ではロゴ等の**表示のみ**可。**タッチ必須のボタンは配置しない**。
    - **全ゲレンデ表示**（bounds フィット / 全ピンを画面内に）は必須 → **タッチ安全域**の2行目クロームに配置（＋地図上フロートでも可だが本モックは1箇所に集約）。
    - **ターゲット日**チップは**小型化**（高さ・字詰め・min-width 縮小）。
    - mock-007 由来: 一覧統合・検索は FAB＋オーバーレイ。

    実装時: `safe-area-inset-*` に加え、端末別の `env()` または計測したデッドゾーン幅を CSS 変数化推奨。
  -->
  <style>
    :root {
      --bg: #070d14;
      --surface-elevated: rgba(22, 34, 52, 0.94);
      --hairline: rgba(255, 255, 255, 0.08);
      --hairline-strong: rgba(255, 255, 255, 0.14);
      --text: #f0f4fa;
      --text-secondary: rgba(200, 212, 230, 0.72);
      --accent: #3ee0c8;
      --accent-dim: rgba(62, 224, 200, 0.22);
      --shadow-fab: 0 4px 24px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.06);
      --chrome-pad: 8px;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --font-sans: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
      --font-brand: "DM Serif Display", Georgia, serif;
      /* スピーカー側デッドゾーン幅（端末で上書き想定） */
      --hw-deadzone-w: max(56px, env(safe-area-inset-left, 0px));
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .mock-ribbon {
      position: fixed;
      top: max(6px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-size: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(7, 13, 20, 0.9);
      border: 1px solid var(--hairline-strong);
      pointer-events: none;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }

    /* ── 1段目: 左＝非タッチ推奨（表示のみ右側） ── */
    .hw-strip {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      min-height: 44px;
      border-bottom: 1px solid var(--hairline);
      background: rgba(7, 13, 20, 0.92);
    }
    .hw-deadzone {
      flex: 0 0 var(--hw-deadzone-w);
      min-width: 48px;
      max-width: 88px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255, 80, 80, 0.07),
        rgba(255, 80, 80, 0.07) 4px,
        rgba(255, 255, 255, 0.03) 4px,
        rgba(255, 255, 255, 0.03) 8px
      );
      border-right: 1px dashed rgba(255, 120, 120, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
    }
    .hw-deadzone__label {
      font-size: 7px;
      line-height: 1.25;
      color: rgba(255, 160, 160, 0.75);
      text-align: center;
      padding: 4px;
      max-width: 100%;
    }
    .hw-strip-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 12px 6px 10px;
      pointer-events: none;
    }
    .brand {
      font-family: var(--font-brand);
      font-size: 1.05rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .hw-strip-hint {
      font-size: 9px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* ── 2段目: タッチ可能クローム（ここにボタンを集約） ── */
    .touch-chrome {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 8px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
      background: linear-gradient(180deg, rgba(10, 16, 26, 0.95) 0%, rgba(10, 16, 26, 0.88) 100%);
      border-bottom: 1px solid var(--hairline);
      backdrop-filter: blur(12px);
    }

    .btn-chrome {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--hairline-strong);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-chrome:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .btn-chrome svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      opacity: 0.9;
    }
    .btn-chrome--accent {
      border-color: rgba(62, 224, 200, 0.45);
      background: var(--accent-dim);
    }
    .touch-chrome__spacer {
      flex: 1;
      min-width: 8px;
    }
    .lang-chip {
      min-height: 44px;
      padding: 0 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      border-radius: 10px;
      border: 1px solid var(--hairline);
      background: rgba(0, 0, 0, 0.2);
      cursor: pointer;
      font-family: inherit;
    }
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 44px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(62, 224, 200, 0.22);
      background: rgba(62, 224, 200, 0.06);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .live-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.3);
    }

    .chrome-note {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-secondary);
      padding: 6px 12px 8px;
      padding-left: max(12px, env(safe-area-inset-left));
      line-height: 1.45;
      border-bottom: 1px solid var(--hairline);
      background: rgba(8, 12, 20, 0.8);
    }
    .chrome-note code {
      font-size: 9px;
      color: var(--accent);
    }

    /* ── 小型ターゲット日 ── */
    .date-rail {
      flex-shrink: 0;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding: 6px 12px 8px;
      padding-left: max(12px, env(safe-area-inset-left));
      scrollbar-width: none;
      border-bottom: 1px solid var(--hairline);
      background: rgba(10, 16, 26, 0.72);
    }
    .date-rail::-webkit-scrollbar { display: none; }
    .date-rail__label {
      flex: 0 0 auto;
      align-self: center;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      padding-right: 4px;
      margin-right: 2px;
      border-right: 1px solid var(--hairline);
    }
    .date-card {
      flex: 0 0 auto;
      min-width: 76px;
      max-width: 92px;
      padding: 5px 7px 6px;
      border-radius: 8px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.03);
      text-align: left;
      cursor: pointer;
      font-family: inherit;
      color: inherit;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .date-card.is-active {
      border-color: rgba(62, 224, 200, 0.55);
      background: var(--accent-dim);
      box-shadow: 0 0 0 1px rgba(62, 224, 200, 0.12);
    }
    .date-card__d {
      font-size: 10px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }
    .date-card__s {
      font-size: 8px;
      color: var(--text-secondary);
      margin-top: 2px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .date-card__snow {
      font-size: 9px;
      font-weight: 600;
      margin-top: 3px;
      font-variant-numeric: tabular-nums;
    }

    .map-stage {
      flex: 1 1 auto;
      position: relative;
      min-height: 44vh;
      overflow: hidden;
    }
    .map-layer {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 38%, rgba(90, 70, 50, 0.35) 0%, transparent 50%),
        linear-gradient(180deg, #1a1510 0%, #0d0b08 100%);
    }
    .map-pin {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -100%) rotate(-45deg);
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 50% 50% 50% 0;
      border: 2px solid #fff;
      box-shadow: var(--shadow-fab);
    }
    .map-pin-label {
      position: absolute;
      left: 50%;
      top: 47%;
      transform: translate(-50%, 12px);
      font-size: 11px;
      font-weight: 700;
      text-shadow: 0 1px 4px #000;
    }

    .search-fab {
      position: absolute;
      top: var(--chrome-pad);
      right: max(12px, env(safe-area-inset-right));
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--hairline-strong);
      background: var(--surface-elevated);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-fab);
      z-index: 5;
      -webkit-tap-highlight-color: transparent;
    }
    .search-fab svg {
      width: 22px;
      height: 22px;
    }

    .zoom-stack {
      position: absolute;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(88px, calc(env(safe-area-inset-bottom) + 72px));
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 4px;
      border-radius: 12px;
      background: var(--surface-elevated);
      border: 1px solid var(--hairline-strong);
      box-shadow: var(--shadow-fab);
    }
    .zoom-stack button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .map-attrib {
      position: absolute;
      left: max(10px, env(safe-area-inset-left));
      bottom: max(6px, env(safe-area-inset-bottom));
      font-size: 8px;
      color: rgba(255, 255, 255, 0.32);
    }

    /* 検索オーバーレイ（mock-007 相当） */
    .search-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(4, 8, 14, 0.55);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s var(--ease-out);
    }
    .search-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .search-panel {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      padding: calc(env(safe-area-inset-top) + 8px) max(14px, env(safe-area-inset-left)) 16px max(14px, env(safe-area-inset-right));
      background: linear-gradient(180deg, rgba(12, 18, 28, 0.98) 0%, rgba(12, 18, 28, 0.94) 100%);
      border-bottom: 1px solid var(--hairline-strong);
      transform: translateY(-100%);
      transition: transform 0.32s var(--ease-out);
    }
    .search-overlay.is-open .search-panel {
      transform: translateY(0);
    }
    .search-panel__row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--hairline-strong);
      background: rgba(0, 0, 0, 0.35);
    }
    .search-input-wrap:focus-within {
      border-color: rgba(62, 224, 200, 0.45);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .search-input {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }
    .search-input::placeholder {
      color: rgba(200, 212, 230, 0.45);
    }
    .search-close {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <p class="mock-ribbon">Mock 008</p>

  <div class="app">
    <div class="hw-strip">
      <div class="hw-deadzone" aria-hidden="true">
        <span class="hw-deadzone__label">スピーカー側<br>非タッチ推奨</span>
      </div>
      <div class="hw-strip-main">
        <span class="brand">JapowSearch</span>
        <span class="hw-strip-hint">この行は表示のみ（タッチ操作なし）</span>
      </div>
    </div>

    <div class="touch-chrome">
      <button type="button" class="btn-chrome" title="showTopView と同一">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        一覧
      </button>
      <button type="button" class="btn-chrome btn-chrome--accent" title="map.fitBounds 全マーカーを含む">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 8V4h4M16 4h4v4M4 16v4h4M16 20h4v-4"/>
          <rect x="8" y="8" width="8" height="8" rx="1"/>
        </svg>
        全ゲレンデ表示
      </button>
      <span class="touch-chrome__spacer"></span>
      <button type="button" class="lang-chip">EN</button>
      <div class="live-pill">Open‑Meteo</div>
    </div>

    <p class="chrome-note">
      <strong>タッチ必須UIは 2 行目以降のみ。</strong> 1 行目左の斜線域は <code>pointer-events: none</code> 例示。
      実機では耳側幅を <code>--hw-deadzone-w</code> で調整。
    </p>

    <div class="date-rail" aria-label="ターゲット日">
      <span class="date-rail__label">日付</span>
      <button type="button" class="date-card">
        <div class="date-card__d">03/27</div>
        <div class="date-card__s">前日</div>
        <div class="date-card__snow">—</div>
      </button>
      <button type="button" class="date-card">
        <div class="date-card__d">03/28</div>
        <div class="date-card__s">今日(土)</div>
        <div class="date-card__snow">❄4cm</div>
      </button>
      <button type="button" class="date-card">
        <div class="date-card__d">03/29</div>
        <div class="date-card__s">明日(日)</div>
        <div class="date-card__snow">❄1cm</div>
      </button>
      <button type="button" class="date-card is-active">
        <div class="date-card__d">03/31</div>
        <div class="date-card__s">+3(火)</div>
        <div class="date-card__snow">—</div>
      </button>
    </div>

    <div class="map-stage">
      <div class="map-layer" aria-hidden="true"></div>
      <div class="map-pin" aria-hidden="true"></div>
      <div class="map-pin-label">0 cm</div>
      <button type="button" class="search-fab" id="searchFab" aria-label="検索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
      </button>
      <div class="zoom-stack">
        <button type="button" aria-label="+">+</button>
        <button type="button" aria-label="−">−</button>
      </div>
      <p class="map-attrib">Leaflet · OSM · CARTO</p>
    </div>
  </div>

  <div class="search-overlay" id="searchOverlay" hidden>
    <div class="search-panel">
      <div class="search-panel__row">
        <div class="search-input-wrap">
          <input class="search-input" id="searchField" type="search" placeholder="ゲレンデ・都道府県..." />
        </div>
        <button type="button" class="search-close" id="searchClose">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var fab = document.getElementById("searchFab");
      var overlay = document.getElementById("searchOverlay");
      var closeBtn = document.getElementById("searchClose");
      var input = document.getElementById("searchField");
      function openSearch() {
        overlay.hidden = false;
        requestAnimationFrame(function () {
          overlay.classList.add("is-open");
          input.focus();
        });
      }
      function closeSearch() {
        overlay.classList.remove("is-open");
        setTimeout(function () {
          overlay.hidden = true;
          input.blur();
        }, 320);
      }
      fab.addEventListener("click", openSearch);
      closeBtn.addEventListener("click", closeSearch);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeSearch();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && overlay.classList.contains("is-open")) closeSearch();
      });
    })();
  </script>
</body>
</html>
