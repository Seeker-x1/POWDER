# 毎時 JST 55 分に気象庁積雪 CSV を取得し data/jma-snow.json を更新する
name: Update JMA snow cache

on:
  schedule:
    - cron: "55 * * * *"   # 毎時 55 分（job の TZ: Asia/Tokyo で JST 毎時55分）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "nothing"

      - name: Fetch JMA snow and write data/jma-snow.json
        run: node scripts/fetch-jma-snow.js
        env:
          TZ: Asia/Tokyo

      - name: Snow accuracy report (non-blocking)
        run: node scripts/validate-snow-accuracy.js || echo "validate-snow-accuracy skipped or failed (non-blocking)"
        continue-on-error: true
        env:
          TZ: Asia/Tokyo

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jma-snow.json
          if git diff --staged --quiet; then
            echo "No changes to JMA snow cache."
          else
            git commit -m "chore: update JMA snow cache [automated]"
            git push
          fi
