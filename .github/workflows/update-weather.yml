# 1時間ごとに全ゲレンデの天気を取得し、data/weather.json に保存してコミット・プッシュする
name: Update weather cache

on:
  schedule:
    - cron: "0 * * * *"   # 毎時 0 分（UTC）。日本時間では 9:00, 10:00, ... など
    - cron: "15 * * * *"  # フェイルオーバー用（runner 取得失敗時の取りこぼしを減らす）
  workflow_dispatch:      # 手動実行も可能

concurrency:
  group: update-weather-cache
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Fetch weather and write data/weather.json
        run: node scripts/fetch-weather-hourly.js
        env:
          TZ: Asia/Tokyo

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weather.json
          if git diff --staged --quiet; then
            echo "No changes to weather cache."
          else
           git commit -m "chore: update weather cache [automated]"
            git pull --rebase origin main
            git push origin main
          fi
