# 毎日 JST 1:10 に前日(JST)のアメダス時間別実績を取得し data/jma-prevday-hourly.json をコミット
name: Update JMA prev-day hourly

on:
  schedule:
    - cron: "10 1 * * *"   # job TZ=Asia/Tokyo → 毎日 1:10 JST
  workflow_dispatch:

concurrency:
  group: update-jma-prevday-hourly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Fetch JMA prev-day hourly
        run: node scripts/fetch-jma-prevday-hourly.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jma-prevday-hourly.json
          if git diff --staged --quiet; then
            echo "No changes to jma-prevday-hourly.json."
          else
            git commit -m "chore: update JMA prev-day hourly cache [automated]"
            git push
          fi
